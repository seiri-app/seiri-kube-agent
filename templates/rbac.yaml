apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "seiri-kube-agent.serviceAccountName" . }}
  labels:
    {{- include "seiri-kube-agent.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "seiri-kube-agent.fullname" . }}-role
rules:
- apiGroups: ["monitoring.seiri.app"]
  resources: ["healthchecks"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["monitoring.seiri.app"]
  resources: ["healthchecks/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "seiri-kube-agent.fullname" . }}-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "seiri-kube-agent.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "seiri-kube-agent.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
